<div class="topbar-right">
    <p-menu #menu [popup]="true" [model]="menuItems" appendTo="body"></p-menu>
    <a class="cursor-pointer flex align-items-center topbar-login-link" (click)="menu.toggle($event)">
        <i class="pi pi-user"></i>
        <span class="profile-name ml-2">{{ authService.firstName }}</span>
        <i class="pi pi-chevron-down ml-1 text-sm"></i>
    </a>
</div>

<!-- Login dialog -->
<p-dialog [(visible)]="loginDialogVisible" [style]="{width: '400px'}" header="Login" [modal]="true" appendTo="body" class="p-fluid">
    <ng-template pTemplate="content">
        <div class="field">
            <label for="email">Email</label>
            <input pInputText id="email" placeholder="Email" class="w-full mt-1" [(ngModel)]="email" />
        </div>
        <div class="field mt-3">
            <label for="password">Password</label>
            <p-password id="password" placeholder="Password" [feedback]="false" [style]="{width:'100%'}" inputStyleClass="w-full" [(ngModel)]="password"></p-password>
        </div>
    </ng-template>
    <ng-template pTemplate="footer">
        <p-button label="Cancel" icon="pi pi-times" [text]="true" (onClick)="loginDialogVisible = false"></p-button>
        <p-button label="Login" icon="pi pi-check" (onClick)="login()"></p-button>
    </ng-template>
</p-dialog>

<!-- Edit Profile dialog -->
<p-dialog [(visible)]="editProfileDialogVisible" [style]="{width: '420px'}" header="Edit Profile" [modal]="true" appendTo="body" class="p-fluid">
    <ng-template pTemplate="content">
        <div class="flex flex-column gap-3 pt-2">
            <div class="flex flex-column gap-1">
                <label class="text-sm font-medium">First name</label>
                <input pInputText class="w-full" [(ngModel)]="editFirstName" />
            </div>
            <div class="flex flex-column gap-1">
                <label class="text-sm font-medium">Last name</label>
                <input pInputText class="w-full" [(ngModel)]="editLastName" />
            </div>
            <div class="flex flex-column gap-1">
                <label class="text-sm font-medium">New password <span class="text-color-secondary text-xs">(leave blank to keep current)</span></label>
                <input pInputText type="password" class="w-full" autocomplete="new-password" [(ngModel)]="editNewPassword" />
            </div>
            <div class="flex flex-column gap-1">
                <label class="text-sm font-medium">Confirm new password</label>
                <input pInputText type="password" class="w-full" autocomplete="new-password" [(ngModel)]="editConfirmPassword" />
            </div>
        </div>
    </ng-template>
    <ng-template pTemplate="footer">
        <p-button label="Cancel" severity="secondary" [text]="true" (onClick)="editProfileDialogVisible = false"></p-button>
        <p-button label="Save" icon="pi pi-check" (onClick)="saveProfile()"></p-button>
    </ng-template>
</p-dialog>

<!-- Server tasks dialog -->
<app-server-tasks #serverTasksDialog></app-server-tasks>

<!-- Settings dialog -->
<p-dialog [(visible)]="settingsDialogVisible" [style]="{width: '420px'}" header="Standaard instellingen" [modal]="true" appendTo="body">
    <div class="flex flex-column gap-3 pt-2">
        <div class="flex flex-column gap-1">
            <label class="text-sm font-medium">Standaard dataset</label>
            <p-select [options]="settingsDatasets" optionLabel="name" optionValue="id"
                [(ngModel)]="settingsModel.datasetId"
                [showClear]="true" placeholder="Kies dataset..."
                appendTo="body" [style]="{'width':'100%'}">
            </p-select>
        </div>
        <div class="flex flex-column gap-1">
            <label class="text-sm font-medium">Standaard station</label>
            <p-select [options]="settingsStations" optionLabel="omschrijving" optionValue="code"
                [(ngModel)]="settingsModel.station"
                [showClear]="true" [filter]="true" placeholder="Kies station..."
                appendTo="body" [style]="{'width':'100%'}">
            </p-select>
        </div>
        <div class="flex flex-column gap-1">
            <label class="text-sm font-medium">Standaard neerslagstation</label>
            <p-select [options]="settingsNeerslagstations" optionLabel="omschrijving" optionValue="code"
                [(ngModel)]="settingsModel.neerslagstation"
                [showClear]="true" [filter]="true" placeholder="Kies neerslagstation..."
                appendTo="body" [style]="{'width':'100%'}">
            </p-select>
        </div>
        <div class="flex flex-column gap-1">
            <label class="text-sm font-medium">Standaard weergave</label>
            <p-select [options]="[{label:'Tabel', value:'table'},{label:'AnyChart', value:'anychart'},{label:'Chart.js', value:'chartjs'}]"
                optionLabel="label" optionValue="value"
                [(ngModel)]="settingsModel.outputMode"
                [showClear]="true" placeholder="Kies weergave..."
                appendTo="body" [style]="{'width':'100%'}">
            </p-select>
        </div>
        <p class="text-xs text-color-secondary m-0">Jaar, maand, dag, week en decade worden automatisch ingesteld op vandaag.</p>
    </div>
    <ng-template pTemplate="footer">
        <p-button label="Annuleren" severity="secondary" [text]="true" (onClick)="settingsDialogVisible = false"></p-button>
        <p-button label="Opslaan" icon="pi pi-check" (onClick)="saveSettings()"></p-button>
    </ng-template>
</p-dialog>
