services:

  mysql:
    image: mysql:8.0
    container_name: bbqweer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: bbqweer
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"   # 3307 on host so it doesn't clash with a local MySQL

  nodejs:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bbqweer-nodejs
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - ./backend/config.ini:/app/config.ini:ro
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    container_name: bbqweer-nginx
    restart: unless-stopped
    depends_on:
      - nodejs
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist/frontend/browser:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
